---
layout: default
---
<section class="home">
  {{ content }}
  <section class="posts">
    {% for post in site.posts %}
      <article>
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        <p class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</p>
        {{ post.excerpt }}
      </article>
    {% endfor %}
  </section>
</section>
